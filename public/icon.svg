<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="plane" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle radar rings -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#1e40af" stroke-width="1.5" opacity="0.25"/>
  <circle cx="256" cy="256" r="110" fill="none" stroke="#1e40af" stroke-width="1.5" opacity="0.2"/>
  <circle cx="256" cy="256" r="60" fill="none" stroke="#1e40af" stroke-width="1.5" opacity="0.15"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="6" fill="#22c55e" opacity="0.8"/>
  <!-- Airplane (rotated 315deg = heading northwest) -->
  <g transform="translate(256,256) rotate(-45)">
    <path d="M0,-100 L20,-40 L20,-10 L80,40 L80,60 L20,30 L20,60 L40,80 L40,95 L0,80 L-40,95 L-40,80 L-20,60 L-20,30 L-80,60 L-80,40 L-20,-10 L-20,-40 Z" fill="url(#plane)"/>
  </g>
</svg>
